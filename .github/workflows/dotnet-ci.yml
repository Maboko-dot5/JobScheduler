# PHASE 11: .github/workflows/dotnet-ci.yml
name: dotnet-ci

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Restore
        run: dotnet restore JobScheduler.sln

      - name: Build
        run: dotnet build JobScheduler.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test JobScheduler.sln --configuration Release --no-build

      - name: Publish API
        run: dotnet publish Scheduler.Api/Scheduler.Api.csproj --configuration Release --no-build --output publish/api

      - name: Publish Client
        run: dotnet publish Scheduler.Client/Scheduler.Client.csproj --configuration Release --no-build --output publish/client
